events {
    worker_connections 1024;
}

http {
    upstream product_service {
        server product-service:8081;
    }

    upstream inventory_service {
        server inventory-service:8082;
    }

    upstream keycloak_service {
        server keycloak:8080;
    }


    server {
        listen 8080;

        # Increase upload limits if needed
        client_max_body_size 10M;

        # Product Service API routing
        location /api/products {
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Inventory Service API routing
        location /api/inventory {
            proxy_pass http://inventory_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Keycloak OIDC routing
        location /realms {
            proxy_pass http://keycloak_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }


        # Health check endpoint
        location /health {
            return 200 'API Gateway is healthy\n';
            add_header Content-Type text/plain;
        }
    }
}
