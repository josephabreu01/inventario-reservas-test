# HTTP port configuration
%prod.quarkus.http.port=${PORT:8082}
%dev.quarkus.http.port=${PORT:8082}
%test.quarkus.http.port=0

# Production Datasource configuration (PostgreSQL)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME:postgres}
%prod.quarkus.datasource.password=${DB_PASSWORD:postgres}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://postgres:5432/inventory_db}
# update: Hibernate agrega columnas nuevas automáticamente sin borrar datos existentes.
# El esquema base es creado por init-db.sql en el primer arranque del contenedor.
%prod.quarkus.hibernate-orm.schema-management.strategy=update
%dev.quarkus.hibernate-orm.schema-management.strategy=update
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Keycloak OIDC Token Verification (Resource Server)
quarkus.oidc.auth-server-url=${KEYCLOAK_URL_DEV:http://localhost:8083/realms/inventrio-realm}
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://keycloak:8080/realms/inventrio-realm}
quarkus.oidc.client-id=inventrio-client
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any

# Disable OIDC server connection on startup during tests since we use @TestSecurity
%test.quarkus.oidc.tenant-enabled=false

# Kafka Configurations (Reactive Messaging)
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS_DEV:localhost:9092}

# TTL explícito por cache
quarkus.cache.type=redis
%test.quarkus.cache.type=caffeine
%prod.quarkus.redis.hosts=${REDIS_HOSTS:redis://redis:6379}
quarkus.redis.hosts=${REDIS_HOSTS_DEV:redis://localhost:6379}
quarkus.cache.redis."inventory-stock".expire-after-write=300S
quarkus.cache.redis."inventory-movements".expire-after-write=600S
quarkus.cache.redis."inventory-all".expire-after-write=300S

# JaCoCo — excluir clases sin lógica de negocio del reporte de cobertura
quarkus.jacoco.excludes=com/inventrio/inventory/domain/model/**,com/inventrio/inventory/domain/exception/**,com/inventrio/inventory/application/*Request*,com/inventrio/inventory/application/*Response*,com/inventrio/inventory/application/ErrorResponse*,com/inventrio/inventory/infrastructure/adapter/in/rest/exception/**,com/inventrio/inventory/infrastructure/adapter/out/persistence/*Entity*,com/inventrio/inventory/infrastructure/adapter/out/messaging/*Event*

# Inbound Channel (product-events)
mp.messaging.incoming.product-events-in.connector=smallrye-kafka
mp.messaging.incoming.product-events-in.topic=product-events
mp.messaging.incoming.product-events-in.value.deserializer=com.inventrio.inventory.infrastructure.adapter.in.event.ProductEventDeserializer
mp.messaging.incoming.product-events-in.auto.offset.reset=earliest

# Outbound Channel (inventory-events)
mp.messaging.outgoing.inventory-events-out.connector=smallrye-kafka
mp.messaging.outgoing.inventory-events-out.topic=inventory-events
mp.messaging.outgoing.inventory-events-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# OpenAPI & Swagger UI Configuration
%dev.quarkus.swagger-ui.enable=true
%prod.quarkus.swagger-ui.enable=false

# Permitir acceso público a Swagger UI y OpenAPI para evitar interferencias con Keycloak/OIDC
%dev.quarkus.http.auth.permission.swagger.paths=/q/swagger-ui/*,/q/openapi*
%dev.quarkus.http.auth.permission.swagger.policy=permit

