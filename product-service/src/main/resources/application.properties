# HTTP port configuration
%prod.quarkus.http.port=${PORT:8081}
%dev.quarkus.http.port=${PORT:8081}
%test.quarkus.http.port=0

# Production Datasource configuration (PostgreSQL)
%prod.quarkus.datasource.db-kind=postgresql
%prod.quarkus.datasource.username=${DB_USERNAME:postgres}
%prod.quarkus.datasource.password=${DB_PASSWORD:postgres}
%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://postgres:5432/product_db}
# update: Hibernate agrega columnas nuevas automáticamente sin borrar datos existentes.
# El esquema base es creado por init-db.sql en el primer arranque del contenedor.
%prod.quarkus.hibernate-orm.schema-management.strategy=update
%dev.quarkus.hibernate-orm.schema-management.strategy=update
%test.quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Redis Configuration for Caching
%prod.quarkus.redis.hosts=${REDIS_HOSTS:redis://redis:6379}
quarkus.redis.hosts=${REDIS_HOSTS_DEV:redis://localhost:6379}
quarkus.cache.type=redis
%test.quarkus.cache.type=caffeine

# TTL explícito por cache (evita datos obsoletos indefinidamente)
quarkus.cache.redis."exchange-rates".expire-after-write=3600S
quarkus.cache.redis."products-list".expire-after-write=600S
quarkus.cache.redis."product-detail".expire-after-write=600S
quarkus.cache.redis."price-history".expire-after-write=1800S
quarkus.cache.redis."product-stock".expire-after-write=300S
quarkus.cache.redis."product-stock".value-type=java.lang.Void

# Keycloak OIDC Token Verification (Resource Server)
quarkus.oidc.auth-server-url=${KEYCLOAK_URL_DEV:http://localhost:8083/realms/inventrio-realm}
%prod.quarkus.oidc.auth-server-url=${KEYCLOAK_URL:http://keycloak:8080/realms/inventrio-realm}
quarkus.oidc.client-id=inventrio-client
quarkus.oidc.application-type=service
quarkus.oidc.token.issuer=any

# Disable OIDC server connection on startup during tests since we use @TestSecurity
%test.quarkus.oidc.tenant-enabled=false

# Kafka Configurations (Reactive Messaging)
%prod.kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS_DEV:localhost:9092}

mp.messaging.outgoing.product-events-out.connector=smallrye-kafka
mp.messaging.outgoing.product-events-out.topic=product-events
mp.messaging.outgoing.product-events-out.value.serializer=io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Inbound Channel (inventory-events) — ECST: sincroniza currentStock localmente
mp.messaging.incoming.inventory-events-in.connector=smallrye-kafka
mp.messaging.incoming.inventory-events-in.topic=inventory-events
mp.messaging.incoming.inventory-events-in.value.deserializer=com.inventrio.product.infrastructure.adapter.in.event.InventoryEventDeserializer
mp.messaging.incoming.inventory-events-in.auto.offset.reset=earliest

# Microprofile REST Client URLs
exchange-rate-api/mp-rest/url=${EXCHANGE_RATE_API_URL:https://v6.exchangerate-api.com/v6/274b0fedc210df25e243b036}
inventory-service-api/mp-rest/url=${INVENTORY_SERVICE_API_URL_DEV:http://localhost:8082}
%prod.inventory-service-api/mp-rest/url=${INVENTORY_SERVICE_API_URL:http://inventory-service:8082}

# OpenAPI & Swagger UI Configuration
%dev.quarkus.swagger-ui.enable=true
%prod.quarkus.swagger-ui.enable=false

# Permitir acceso público a Swagger UI y OpenAPI para evitar interferencias con Keycloak/OIDC
%dev.quarkus.http.auth.permission.swagger.paths=/q/swagger-ui/*,/q/openapi*
%dev.quarkus.http.auth.permission.swagger.policy=permit

# Disable quarkus-jacoco HTML report — jacoco-maven-plugin generates the filtered one
%test.quarkus.jacoco.report=false

# Logging — text in dev, JSON in prod
%dev.quarkus.log.console.json=false
%prod.quarkus.log.console.json=true
quarkus.log.console.json.pretty-print=false

# Log levels by environment
%dev.quarkus.log.level=INFO
%prod.quarkus.log.level=INFO
quarkus.log.category."com.inventrio".level=DEBUG
quarkus.log.category."io.quarkus".level=WARN
quarkus.log.category."org.hibernate".level=WARN

